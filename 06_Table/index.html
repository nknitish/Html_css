<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Table</title>

    <style>
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #333;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f4f4f4;
      }
    </style>
  </head>

  <body>
    <h2>User Details</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td>Nitish Kumar</td>
          <td>nitish@example.com</td>
          <td>Frontend Developer</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Rahul Sharma</td>
          <td>rahul@example.com</td>
          <td>Backend Developer</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Anjali Singh</td>
          <td>anjali@example.com</td>
          <td>UI Designer</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
