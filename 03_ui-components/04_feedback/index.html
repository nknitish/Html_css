<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Feedback Components</title>
    <style>
      body {
        font-family: system-ui;
        padding: 16px;
      }
      .modal {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.4);
        visibility: hidden;
      }
      .modal.open {
        visibility: visible;
      }
      .dialog {
        background: #fff;
        padding: 16px;
        border-radius: 8px;
        max-width: 320px;
      }
      .toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        background: #111;
        color: #fff;
        padding: 10px;
        border-radius: 6px;
        opacity: 0;
        transform: translateY(12px);
        transition: all 0.2s;
      }
      .toast.show {
        opacity: 1;
        transform: none;
      }
      .tooltip {
        position: relative;
        display: inline-block;
      }
      .tooltip span {
        position: absolute;
        bottom: 120%;
        left: 50%;
        transform: translateX(-50%);
        background: #000;
        color: #fff;
        padding: 6px;
        border-radius: 4px;
        white-space: nowrap;
        display: none;
      }
      .tooltip:hover span {
        display: block;
      }
      .progress {
        width: 100%;
        background: #eee;
        height: 12px;
        border-radius: 8px;
        overflow: hidden;
      }
      .bar {
        height: 100%;
        background: #36f;
        width: 30%;
      }
      .skeleton {
        background: linear-gradient(90deg, #eee, #f7f7f7, #eee);
        height: 18px;
        border-radius: 6px;
        animation: shimmer 1.2s infinite;
      }
      @keyframes shimmer {
        from {
          background-position: -200px 0;
        }
        to {
          background-position: 200px 0;
        }
      }
    </style>
  </head>
  <body>
    <h1>Feedback</h1>
    <button id="open">Open modal</button>
    <button id="toastBtn">Show toast</button>
    <div class="tooltip">Hover me<span>Tooltip content</span></div>

    <div class="modal" id="modal">
      <div class="dialog" role="dialog" aria-modal="true">
        <p>Modal content</p>
        <button id="close">Close</button>
      </div>
    </div>
    <div class="toast" id="toast">Saved</div>

    <h2>Progress</h2>
    <div class="progress"><div class="bar" id="bar"></div></div>

    <h2>Skeleton</h2>
    <div class="skeleton" style="width: 60%"></div>

    <script>
      document
        .getElementById("open")
        .addEventListener("click", () =>
          document.getElementById("modal").classList.add("open"),
        );
      document
        .getElementById("close")
        .addEventListener("click", () =>
          document.getElementById("modal").classList.remove("open"),
        );
      document.getElementById("toastBtn").addEventListener("click", () => {
        const t = document.getElementById("toast");
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      });
      // Simulate progress
      let p = 30;
      setInterval(() => {
        p = Math.min(100, p + 5);
        document.getElementById("bar").style.width = p + "%";
      }, 800);
    </script>
  </body>
</html>
