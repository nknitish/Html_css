<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta http-equiv="refresh" content="5"> -->
    <title>Document</title>
    <style>
        input{
            display: block;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>Header</header>
    <section>
        <div>
            <strong>Strong Text</strong>
            <b>Bold Text</b>
            <i>Itelic</i>
            <em>Emphasized Text</em>
            <mark>Marked Text</mark>
            <small>Small Text</small>
            <del>Deleted Text</del>
            <ins>Inserted Text</ins>
            <sub>Subscript</sub>
            <sup>Superscript</sup>
        </div>
        <div>
            <p>Thi is a         paragraph</p>
            <pre>There is lot of.         space here </pre>

            <p>Thi is a &nbsp; &copy;paragraph</p>
            <p>&lt;p&gt;Hi &lt;/p&gt;</p>
        </div>
        <form>
            <input type="text" placeholder="Text Input">
            <input type="password" placeholder="Password Input">
            <input type="search" name="" id="">
            <input type="color" name="" id="">
            <input type="range" name="" id="" min="10" max="100" step="10" value="50">
            <input type="checkbox" name="" id="" >
            <input type="radio" name="Hello" id="" >
            <input type="file" name="" id="">
            <input type ="date" name="" id="">
        </form>

        <div>

            <label">
                <input type="radio" name="options" id="option1" value="male" checked>
                Male
            </label>
            <label>
                <input type="radio" name="options" id="option2" value="female">
                Female
            </label>
        </div>

    </section>
    <aside>Aside</aside>
    <footer>Footer</footer>
</body>
</html>
