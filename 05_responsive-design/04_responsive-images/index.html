<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Responsive Images</title>
    <style>
      body {
        font-family: system-ui;
        padding: 16px;
      }
      img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Responsive Images</h1>
    <picture>
      <source
        srcset="
          /hero-small.webp   480w,
          /hero-medium.webp  800w,
          /hero-large.webp  1200w
        "
        type="image/webp"
      />
      <img
        src="/hero-medium.jpg"
        alt="Hero"
        srcset="
          /hero-small.jpg   480w,
          /hero-medium.jpg  800w,
          /hero-large.jpg  1200w
        "
        sizes="(max-width:600px) 480px, 800px"
      />
    </picture>
    <p>Browser selects best source based on device and sizes.</p>
  </body>
</html>
