<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CSS Fundamentals — Demo</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .internal-card {
        padding: 12px;
        border: 2px dashed #58a;
        background: #eef3ff;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CSS Fundamentals</h1>
      <section class="inline-style">
        <h2>Inline CSS</h2>
        <p
          style="
            color: #b00;
            background: #fee;
            padding: 10px;
            border-radius: 4px;
          "
        >
          This paragraph uses inline CSS.
        </p>
      </section>
      <section class="internal-style">
        <h2>Internal CSS</h2>
        <div class="internal-card">
          This box is styled with internal CSS inside the HTML document.
        </div>
      </section>
      <section class="external-style">
        <h2>External CSS</h2>
        <p>This text is styled using external CSS from styles.css.</p>
      </section>
    </main>
  </body>
</html>
