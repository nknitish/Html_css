<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Meta Tags — Demo</title>
    <meta name="description" content="Compact demo of common meta tags" />
    <link rel="canonical" href="https://example.com/meta-demo" />
    <!-- Open Graph -->
    <meta property="og:title" content="Meta Demo" />
    <meta property="og:description" content="A small demo" />
    <meta property="og:image" content="/og-image.png" />
    <style>
      body {
        font-family: system-ui;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Meta tags</h1>
    <p>
      Open the page source to inspect meta tags: title, description, canonical
      and Open Graph.
    </p>
  </body>
</html>
