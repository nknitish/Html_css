<!doctype html>
<html>
  <head>
    <style>
      .city {
        background-color: tomato;
        color: white;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h2 class="city" data-country="England">London</h2>
    <p>London is the capital of England.</p>

    <h2 class="city" data-country="France">Paris</h2>
    <p>Paris is the capital of France.</p>

    <h2 class="city" data-country="Japan">Tokyo</h2>
    <p>Tokyo is the capital of Japan.</p>
  </body>

  <script>
    var x = document.getElementsByClassName("city");
    for (item of x) {
      console.log("Item : ", item);
      console.log("Text value:", item.innerText);
      console.log("HTML content:", item.innerHTML);
      console.log("Tag name:", item.tagName);
      console.log("Class name:", item.className);
      console.log("Data-country:", item.getAttribute("data-country"));
    }
  </script>
</html>
